<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .profile-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; font-size: 24px; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; background-color: #fafafa; color: #333; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        #send-btn { background-color: #007bff; color: white; }
        #send-btn:hover { background-color: #0056b3; }
        #close-btn { background-color: #dc3545; color: white; }
        #close-btn:hover { background-color: #bd2130; }
        #status-banner { font-size: 13px; color: #28a745; font-weight: 500; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>User Profile</h2>
    <div id="status-banner">Connection Status: Ready for Sync</div>
    
    <div class="form-group">
        <label for="input-name">Full Name</label>
        <input type="text" id="input-name" placeholder="Awaiting synchronization..." readonly>
    </div>
    
    <div class="form-group">
        <label for="input-age">Age</label>
        <input type="text" id="input-age" placeholder="Awaiting synchronization..." readonly>
    </div>
    
    <div class="form-group">
        <label for="input-location">Location</label>
        <input type="text" id="input-location" placeholder="Awaiting synchronization..." readonly>
    </div>

    <div class="btn-container">
        <button id="send-btn">Sync Profile</button>
        <button id="close-btn">Close Dashboard</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
